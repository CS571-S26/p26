<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StudyFlow</title>
    <script>
      // GitHub Pages SPA redirect: rewrite the deep-link path into a query
      // string the app can decode in index.html, then bounce to /p26/.
      (function () {
        var segmentCount = 1; // /p26/ project page
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
